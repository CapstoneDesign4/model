# 위험 소리 클래스 화이트리스트 설정
# 인덱스 기준: yamnet_class_map.csv (YAMNet 521 클래스)
# 문서 참조: docs/m1-initial-model-spec.md §4

danger_classes:
  - key: screaming
    display_name: "Screaming"
    yamnet_index: 11
    threshold: 0.5
    cooldown_sec: 5.0

  - key: baby_cry
    display_name: "Baby cry, infant cry"
