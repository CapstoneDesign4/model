# 위험 소리 클래스 화이트리스트 설정
# 인덱스 기준: yamnet_class_map.csv (YAMNet 521 클래스)
# 문서 참조: docs/m1-initial-model-spec.md §4
#
# 클래스별 threshold 근거 (experiments/eval_20260511_192355 기반, ESC-50 18개 샘플):
#   - baby_cry 0.15  : 데이터 최저 max score 0.1656 회수
#   - glass_shatter / breaking 0.4 : 한 샘플이 0.54/0.59 → 0.5에서 놓침
#   - explosion 0.98 : negative footsteps(1-155858-A-25)가 0.9717로 오탐 → 차단
#   - siren / vehicle_horn 0.5 : 최저 score 0.65/0.87 로 여유 충분
#   - 그 외 클래스는 평가 샘플 부족 → 0.5 보수적 유지

# ─────────────────────────────────────────────────
# 글로벌 debounce 설정 (클래스별 오버라이드 없으면 이 값 사용)
# M2 신규 추가. 해당 블록이 없으면 기본값 window=3, k=2 적용.
# ─────────────────────────────────────────────────
debounce:
  window: 3   # int, 슬라이딩 윈도우 크기 (N)
  k: 2        # int, 트리거 최소 양성 투표 수 (K)

danger_classes:
  - key: screaming
    display_name: "Screaming"
    yamnet_index: 11
    threshold: 0.5
    cooldown_sec: 5.0

  - key: baby_cry
    display_name: "Baby cry, infant cry"
    yamnet_index: 20
    threshold: 0.15
    cooldown_sec: 5.0

  # glass(435) + shatter(437) 두 인덱스의 max()를 단일 이벤트로 처리
  - key: glass_shatter
    display_name: "Glass / Shatter"
    yamnet_indices: [435, 437]
    threshold: 0.4
    cooldown_sec: 5.0

  - key: breaking
    display_name: "Breaking"
    yamnet_index: 464
    threshold: 0.4
    cooldown_sec: 5.0

  - key: gunshot
    display_name: "Gunshot, gunfire"
    yamnet_index: 421
    threshold: 0.5
    cooldown_sec: 5.0

  - key: explosion
    display_name: "Explosion"
    yamnet_index: 420
    threshold: 0.98
    cooldown_sec: 5.0

  - key: fire_alarm
    display_name: "Fire alarm"
    yamnet_index: 394
    threshold: 0.5
    cooldown_sec: 5.0

  - key: smoke_alarm
    display_name: "Smoke detector, smoke alarm"
    yamnet_index: 393
    threshold: 0.5
    cooldown_sec: 5.0

  - key: siren
    display_name: "Siren"
    yamnet_index: 390
    threshold: 0.5
    cooldown_sec: 5.0

  - key: civil_defense_siren
    display_name: "Civil defense siren"
    yamnet_index: 391
    threshold: 0.5
    cooldown_sec: 5.0

  - key: car_alarm
    display_name: "Car alarm"
    yamnet_index: 304
    threshold: 0.5
    cooldown_sec: 5.0

  - key: vehicle_horn
    display_name: "Vehicle horn, car horn, honking"
    yamnet_index: 302
    threshold: 0.5
    cooldown_sec: 5.0
